<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inquiry | Hickman Consulting LLC</title>
    <meta
      name="description"
      content="Start an inquiry with Hickman Consulting LLC about consulting, coaching, speaking, or pilot partnerships."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Sora:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <a class="brand" href="index.html" aria-label="Hickman Consulting LLC home">
          <span class="brand-mark">
            <img
              src="assets/ai-classroom-logo.png"
              alt="AI Classroom logo"
            />
          </span>
          <span class="brand-copy">
            <strong>Hickman Consulting LLC</strong>
            <span>AI Classroom Consulting</span>
          </span>
        </a>
        <nav class="site-nav">
          <a href="index.html">Home</a>
          <a href="services.html">Services</a>
          <a href="pilot-partnerships.html">Pilot Partnerships</a>
          <a href="about.html">About</a>
          <a class="current" href="inquiry.html">Inquiry</a>
        </nav>
      </header>

      <main>
        <section class="page-hero">
          <p class="eyebrow">Inquiry</p>
          <h1>Start the Conversation</h1>
          <p class="hero-text">
            Share a few details about your organization and goals. Our team will be in contact
            with you as soon as possible!
          </p>
        </section>

        <section class="section contact-section">
          <form
            class="inquiry-form"
            action="https://formsubmit.co/hunter.hickman@hickmanconsultingai.com"
            method="POST"
          >
            <input type="hidden" name="_subject" value="New inquiry from Hickman Consulting LLC website" />
            <input
              type="hidden"
              name="_next"
              value="https://hickman103.github.io/HickmanConsulting/thank-you.html"
            />
            <input type="hidden" name="_captcha" value="false" />
            <div class="field-row">
              <label>
                Name
                <input type="text" name="name" autocomplete="name" required />
              </label>
              <label>
                Organization
                <input type="text" name="organization" autocomplete="organization" required />
              </label>
            </div>

            <div class="field-row">
              <label>
                Email
                <input type="email" name="email" autocomplete="email" required />
              </label>
              <label>
                Role
                <input type="text" name="role" placeholder="Superintendent, principal, coach, etc." />
              </label>
            </div>

            <label>
              What are you interested in?
              <select name="interest" required>
                <option value="">Select one</option>
                <option>Consulting</option>
                <option>Coaching</option>
                <option>Speaking</option>
                <option>Pilot Partnership</option>
                <option>Not sure yet</option>
              </select>
            </label>

            <label>
              What would you like support with?
              <textarea
                name="message"
                rows="6"
                placeholder="Tell me about your goals, current challenges, or the kind of engagement you're considering."
                required
              ></textarea>
            </label>

            <div class="form-actions">
              <button class="button button-primary" type="submit">Send Inquiry</button>
            </div>
          </form>
        </section>
      </main>

      <footer class="site-footer">
        <img
          class="footer-logo"
          src="assets/ai-classroom-logo.png"
          alt="AI Classroom logo"
        />
        <p>Hickman Consulting LLC</p>
        <div class="social-links">
          <a
            class="social-link"
            href="https://www.youtube.com/@hickmanconsultingai"
            target="_blank"
            rel="noreferrer"
            aria-label="Visit Hickman Consulting AI on YouTube"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M21.58 7.19a2.99 2.99 0 0 0-2.1-2.11C17.62 4.58 12 4.58 12 4.58s-5.62 0-7.48.5a2.99 2.99 0 0 0-2.1 2.11c-.5 1.86-.5 5.73-.5 5.73s0 3.87.5 5.73a2.99 2.99 0 0 0 2.1 2.11c1.86.5 7.48.5 7.48.5s5.62 0 7.48-.5a2.99 2.99 0 0 0 2.1-2.11c.5-1.86.5-5.73.5-5.73s0-3.87-.5-5.73ZM10.2 15.78V9.06l5.82 3.36-5.82 3.36Z"
              />
            </svg>
          </a>
          <a
            class="social-link"
            href="https://www.skool.com/ai-for-educators-3099"
            target="_blank"
            rel="noreferrer"
            aria-label="Visit the AI for Educators Skool community"
          >
            <img class="social-image" src="assets/skool-logo.png" alt="Skool logo" />
          </a>
          <a
            class="social-link"
            href="mailto:hunter.hickman@hickmanconsultingai.com"
            aria-label="Email Hunter Hickman"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M3 6.75A1.75 1.75 0 0 1 4.75 5h14.5A1.75 1.75 0 0 1 21 6.75v10.5A1.75 1.75 0 0 1 19.25 19H4.75A1.75 1.75 0 0 1 3 17.25V6.75Zm1.9-.25 7.1 5.22 7.1-5.22H4.9Zm14.6 11V8.39l-6.98 5.13a.9.9 0 0 1-1.04 0L4.5 8.39v9.11h15Z"
              />
            </svg>
          </a>
          <a
            class="social-link"
            href="https://www.linkedin.com/in/hunter-hickman-m-s-2b501383/"
            target="_blank"
            rel="noreferrer"
            aria-label="Visit Hunter Hickman on LinkedIn"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M6.94 8.5H3.56V20h3.38V8.5ZM5.25 3A1.96 1.96 0 0 0 3.3 4.97c0 1.08.86 1.97 1.93 1.97h.02c1.1 0 1.97-.89 1.97-1.97A1.96 1.96 0 0 0 5.27 3h-.02ZM20.7 12.4c0-3.45-1.84-5.05-4.29-5.05-1.98 0-2.86 1.09-3.36 1.86V8.5H9.67c.04.47 0 11.5 0 11.5h3.38v-6.42c0-.34.03-.68.12-.93.27-.68.88-1.38 1.9-1.38 1.34 0 1.87 1.03 1.87 2.54V20H20.7v-7.6Z"
              />
            </svg>
          </a>
        </div>
      </footer>
    </div>
  </body>
</html>
